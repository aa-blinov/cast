name: Deploy docs to Pages

on:
  push:
    branches: [master]
    paths:
      - docs/**
      - scripts/build-site.mjs
      - install.sh
      - install.ps1
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time — a second push while one's still
# running should wait, not race it (cancel-in-progress: false), since a
# half-replaced deploy mid-deploy is worse than a queued deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install marked
        run: npm install --ignore-scripts marked

      - name: Build site
        run: node scripts/build-site.mjs

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
